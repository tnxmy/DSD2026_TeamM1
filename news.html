<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - M1 Project</title>
    <!-- 依然引用你的 style.css -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* 保持之前的样式不变 */
        .news-list { margin-top: 2rem; }
        .news-item { padding: 2rem; border-bottom: 1px solid #eee; margin-bottom: 1rem; border-radius: 8px; background: #fff; border: 1px solid #eee; }
        .news-date { font-size: 0.85rem; color: #888; font-family: monospace; display: block; margin-bottom: 0.5rem; }
        .news-title { margin: 0 0 1rem 0; font-size: 1.5rem; }
        .news-title a { text-decoration: none; color: #333; }
        .news-title a:hover { color: #007bff; }
        .news-excerpt { line-height: 1.6; color: #666; }
    </style>
</head>
<body>

  <!-- 导航栏 -->
  <nav>
    <div class="container nav-container">
      <a href="index.html" class="logo">M1 Project</a>
      <ul class="nav-links">
        <li><a href="index.html#mission">Mission</a></li>
        <li><a href="index.html#team">Team</a></li>
        <li><a href="index.html#workflow">Workflow</a></li>
        <li><a href="news.html">News</a></li>
      </ul>
    </div>
  </nav>

  <!-- 主要内容 -->
  <main style="padding-top: 100px; padding-bottom: 50px;">
    <div class="container">
      <div class="reveal">
        <p class="section-label">Development Log</p>
        <h1 style="margin-bottom: 3rem;">Latest Updates</h1>
      </div>

      <div class="news-list">
        <!-- 
           核心代码在这里 
           如果这里显示为空，说明 GitHub 还没识别出 posts
        -->
        {% for post in site.posts %}
        <article class="news-item reveal">
          <span class="news-date">{{ post.date | date: "%Y-%m-%d" }}</span>
          <h2 class="news-title"><a href="{{ post.url }}">{{ post.title }}</a></h2>
          <p class="news-excerpt">{{ post.excerpt | strip_html | truncate: 100 }}</p>
        </article>
        {% endfor %}
        
        <!-- 如果上面没显示内容，请检查 _posts 文件夹 -->
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer>
    <div class="container footer-container">
      <p>&copy; 2026 M1 Project Team.</p>
      <ul class="footer-links">
        <li><a href="index.html#mission">Mission</a></li>
        <li><a href="news.html">News</a></li>
      </ul>
    </div>
  </footer>

</body>
</html>
